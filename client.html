<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <title>FAKDU POS (Client)</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="duplicate-guard" class="overlay hidden"><div class="card center"><h2>เปิดซ้ำหลายแท็บ</h2><p>เครื่องลูกเปิดได้ 1 แท็บเท่านั้น</p></div></div>

  <header class="header">
    <div class="brand">
      <img id="client-avatar" src="icon.png" alt="avatar" />
      <div>
        <div id="client-name">Client</div>
        <div class="dots">
          <span id="client-dot-online" class="dot idle"></span>
          <span id="client-dot-sync" class="dot idle"></span>
        </div>
      </div>
    </div>
  </header>

  <nav class="tabs premium">
    <button class="tab active" data-tab="units" onclick="switchClientTab('units')">🪑</button>
    <button class="tab" data-tab="bill" onclick="switchClientTab('bill')">🧾</button>
    <button class="tab" data-tab="settings" onclick="switchClientTab('settings')">👤</button>
  </nav>

  <main>
    <section id="c-screen-units" class="screen active">
      <div class="row between">
        <div class="zoom-toolbar">
          <button onclick="changeClientGridZoom(-1)">-</button>
          <button onclick="setClientGridZoom(1)">S</button>
          <button onclick="setClientGridZoom(2)" id="c-zoom-m" class="active">M</button>
          <button onclick="setClientGridZoom(3)">L</button>
          <button onclick="changeClientGridZoom(1)">+</button>
        </div>
        <button onclick="openJoin()">เชื่อมร้าน</button>
      </div>
      <div id="client-unit-grid" class="unit-grid"></div>
      <div id="client-menu-list" class="menu-list"></div>
      <div class="fixed-order-bar"><div><span id="client-cart-count">0</span> • ฿<span id="client-cart-total">0</span></div><button onclick="sendDraftOrder()">ส่งออร์เดอร์</button></div>
    </section>

    <section id="c-screen-bill" class="screen"><div id="client-bill-list"></div></section>

    <section id="c-screen-settings" class="screen">
      <div class="card">
        <label>ชื่อเครื่อง <input id="client-name-input" /></label>
        <label>รูปเครื่อง <input type="file" accept="image/*" onchange="handleClientImage(event)" /></label>
        <button onclick="saveClientProfile()">บันทึก</button>
      </div>
      <div class="card">
        <div>Shop ID <input id="join-shop-id" /></div>
        <div>PIN <input id="join-pin" /></div>
        <button onclick="submitJoin()">ขอเชื่อม</button>
      </div>
    </section>
  </main>

  <script src="js/db.js"></script>
  <script src="js/vault.js"></script>
  <script src="js/core-client.js"></script>
  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
  </script>
</body>
</html>
