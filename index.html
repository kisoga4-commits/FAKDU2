<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <title>FAKDU POS (Master)</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="duplicate-guard" class="overlay hidden">
    <div class="card center">
      <h2>เปิดซ้ำหลายแท็บ</h2>
      <p>ระบบแม่เปิดได้ 1 แท็บเท่านั้น เพื่อกันข้อมูลชนกัน</p>
      <button onclick="location.reload()">ลองใหม่</button>
    </div>
  </div>

  <header class="header">
    <div class="brand">
      <img id="shop-logo" src="icon.png" alt="logo" />
      <div>
        <div id="shop-name">FAKDU</div>
        <div class="dots">
          <span id="dot-online" class="dot idle" title="network"></span>
          <span id="dot-sync" class="dot idle" title="sync"></span>
          <span id="dot-risk" class="dot idle" title="risk"></span>
          <button id="risk-bell" class="icon-btn hidden" onclick="showRiskLogs()">🔔</button>
        </div>
      </div>
    </div>
  </header>

  <nav class="tabs premium">
    <button class="tab active" data-tab="customer" onclick="switchTab('customer')">🪑</button>
    <button class="tab" data-tab="shop" onclick="switchTab('shop')">🧾</button>
    <button class="tab" data-tab="manage" onclick="openAdminTab('manage')">📊</button>
    <button class="tab" data-tab="system" onclick="openAdminTab('system')">⚙️</button>
  </nav>

  <main>
    <section id="screen-customer" class="screen active">
      <div class="section-head">
        <div class="zoom-toolbar">
          <button onclick="changeGridZoom(-1)">-</button>
          <button id="zoom-s" onclick="setGridZoom(1)">S</button>
          <button id="zoom-m" onclick="setGridZoom(2)" class="active">M</button>
          <button id="zoom-l" onclick="setGridZoom(3)">L</button>
          <button onclick="changeGridZoom(1)">+</button>
        </div>
      </div>
      <div id="unit-grid" class="unit-grid"></div>
    </section>

    <section id="screen-order" class="screen">
      <div class="row between"><button onclick="switchTab('customer')">←</button><h3 id="order-title"></h3></div>
      <div id="menu-list" class="menu-list"></div>
      <div class="fixed-order-bar">
        <div><span id="cart-count">0</span> • ฿<span id="cart-total">0</span></div>
        <button onclick="reviewCart()">ส่งออร์เดอร์</button>
      </div>
    </section>

    <section id="screen-shop" class="screen"><div id="checkout-list"></div></section>

    <section id="screen-manage" class="screen">
      <div class="card">
        <h3>ยอดขาย</h3>
        <div id="sales-summary"></div>
        <h4>ยอดฮิต (จากบิลที่ปิดแล้ว)</h4>
        <div id="top-items"></div>
      </div>
      <div class="card">
        <h3>เมนูและราคา</h3>
        <div id="admin-menu"></div>
        <button onclick="addMenuItem()">+ เมนู</button>
      </div>
    </section>

    <section id="screen-system" class="screen">
      <div class="card">
        <h3>ระบบ</h3>
        <label>Shop Name <input id="sys-shop-name" /></label>
        <label>Admin PIN <input id="sys-admin-pin" type="password" /></label>
        <label>Theme <input id="sys-theme" type="color" value="#111827" /></label>
        <label>Logo <input type="file" accept="image/*" onchange="handleImage(event,'logo')" /></label>
        <button onclick="saveSystem()">บันทึก</button>
      </div>
      <div class="card">
        <h3>Sync</h3>
        <div>Shop ID: <b id="shop-id"></b></div>
        <div>PIN: <b id="sync-pin"></b></div>
        <button onclick="resetSyncPin()">เปลี่ยน PIN</button>
        <button onclick="manualSyncCheck()">Sync Check</button>
        <div id="sync-check-text"></div>
      </div>
      <div class="card">
        <h3>ลูกที่รออนุมัติ</h3>
        <div id="approve-list"></div>
      </div>
      <div class="card danger">
        <h3>Recovery</h3>
        <label>Phone <input id="rec-phone" /></label>
        <label>Color <input id="rec-color" /></label>
        <label>Animal <input id="rec-animal" /></label>
        <button onclick="saveRecovery()">บันทึก recovery</button>
        <button onclick="recoverPin()">กู้ PIN</button>
      </div>
    </section>
  </main>

  <div id="pin-modal" class="overlay hidden">
    <div class="card center">
      <h3>Admin PIN</h3>
      <input id="pin-input" type="password" />
      <div class="row"><button onclick="closePin()">ยกเลิก</button><button onclick="verifyPin()">เข้า</button></div>
      <div id="pin-error" class="error"></div>
    </div>
  </div>

  <div id="review-modal" class="overlay hidden"><div class="card"><div id="review-lines"></div><button onclick="confirmSendOrder()">ยืนยันส่ง</button><button onclick="closeReview()">ปิด</button></div></div>

  <script src="js/db.js"></script>
  <script src="js/vault.js"></script>
  <script src="js/core.js"></script>
  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
  </script>
</body>
</html>
